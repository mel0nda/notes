<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NOTES</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <span class="logo">NOTEs</span>
            </div>
            <div class="toolbar">
                <label class="btn btn-primary" title="Upload .txt or .md file">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    upload file
                    <input
                        type="file"
                        id="file-input"
                        accept=".txt,.md"
                        multiple
                    />
                </label>
                <button class="btn" id="add-btn" title="Add text manually">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    add text
                </button>
                <div class="sep"></div>
                <label class="label-group">
                    <span>size</span>
                    <select id="size-sel">
                        <option value="10">xs</option>
                        <option value="14" selected>s</option>
                        <option value="20">m</option>
                        <option value="28">l</option>
                        <option value="40">xl</option>
                        <option value="56">xxl</option>
                    </select>
                </label>
                <label class="label-group">
                    <span>color</span>
                    <select id="color-sel">
                        <option value="ink">ink</option>
                        <option value="chalk">chalk</option>
                        <option value="rust">rust</option>
                        <option value="sage">sage</option>
                        <option value="slate">slate</option>
                        <option value="gold">gold</option>
                    </select>
                </label>
                <label class="label-group">
                    <span>style</span>
                    <select id="style-sel">
                        <option value="serif">serif</option>
                        <option value="mono">mono</option>
                        <option value="italic">italic</option>
                    </select>
                </label>
                <div class="sep"></div>
                <button class="btn" id="scatter-btn" title="Scatter all pieces">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="5" cy="12" r="1" />
                        <circle cx="12" cy="5" r="1" />
                        <circle cx="19" cy="5" r="1" />
                        <circle cx="5" cy="19" r="1" />
                        <circle cx="19" cy="19" r="1" />
                        <circle cx="12" cy="19" r="1" />
                    </svg>
                    scatter
                </button>
                <button
                    class="btn"
                    id="export-btn"
                    title="Export canvas as PNG"
                >
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    export
                </button>
                <button
                    class="btn btn-danger"
                    id="clear-btn"
                    title="Clear canvas"
                >
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6l-1 14H6L5 6" />
                        <path d="M10 11v6" />
                        <path d="M14 11v6" />
                        <path d="M9 6V4h6v2" />
                    </svg>
                    clear
                </button>
            </div>
        </header>

        <main id="canvas" role="main" aria-label="Text collage canvas">
            <div class="drop-overlay" id="drop-overlay">
                <svg
                    width="32"
                    height="32"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                drop to scatter
            </div>
            <div class="hint" id="hint">
                <p class="hint-title">your canvas awaits</p>
                <p class="hint-sub">
                    upload a .txt file or type something to begin<br />drag
                    pieces to recompose · double-click to edit
                </p>
            </div>
        </main>

        <!-- Edit modal -->
        <div class="modal-backdrop" id="modal-backdrop">
            <div
                class="modal"
                id="modal"
                role="dialog"
                aria-modal="true"
                aria-label="Edit text piece"
            >
                <textarea
                    id="modal-input"
                    rows="4"
                    placeholder="type your text…"
                ></textarea>
                <div class="modal-actions">
                    <button class="btn" id="modal-cancel">cancel</button>
                    <button class="btn btn-primary" id="modal-confirm">
                        add to canvas
                    </button>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
